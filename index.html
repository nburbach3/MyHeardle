<body>
    <div id="basePage">
        <div id="header">
            <div id="headerContents">
                <a class="foreground" id="nebraskaLink" href="https://nburbach3.github.io/Portfolio/" target="_blank">
                    <img src="/images/nebraskaN.png" id="nebraskaImg">
                </a>
                <h1 class="foreground" id="headerTitle">My Heardle</h1>
            </div>
        </div>
        <div id="content">
            <div id="guessBoxes">
                <div id="guessBox1" class="guessBox">
                    <div class="skipped" hidden="true">SKIPPED</div>
                    <div class="wrong" hidden="true">SKIPPED</div>
                    <div class="partiallyCorrect" hidden="true">SKIPPED</div>
                    <div class="correct" hidden="true">SKIPPED</div>
                </div>
                <div id="guessBox2" class="guessBox">

                </div>
                <div id="guessBox3" class="guessBox">

                </div>
                <div id="guessBox4" class="guessBox">

                </div>
                <div id="guessBox5" class="guessBox">

                </div>
                <div id="guessBox6" class="guessBox">

                </div>
            </div>
        </div>
        <div id="progressDiv">
            <div id="progressBar">
                <div id="play1">

                </div>
                <div id="play2">

                </div>
                <div id="play3">

                </div>
                <div id="play4">

                </div>
                <div id="play5">

                </div>
                <div id="play6">

                </div>
            </div>
        </div>

                    <p class="foreground">0:01</p>
                </div>
                <div id="playButtonDiv" class="row">
                    <button id="playButton">
                        <svg role="img" height="16" width="16" viewBox="0 0 16 16">
                            <path
                                d="M3 1.713a.7.7 0 0 1 1.05-.607l10.89 6.288a.7.7 0 0 1 0 1.212L4.05 14.894A.7.7 0 0 1 3 14.288V1.713z">

                        </svg>
                    </button>
                    <button id="pauseButton" hidden="true">
                        <svg role="img" height="16" width="16" viewBox="0 0 16 16">
                            <path
                                d="M2.7 1a.7.7 0 0 0-.7.7v12.6a.7.7 0 0 0 .7.7h2.6a.7.7 0 0 0 .7-.7V1.7a.7.7 0 0 0-.7-.7H2.7zm8 0a.7.7 0 0 0-.7.7v12.6a.7.7 0 0 0 .7.7h2.6a.7.7 0 0 0 .7-.7V1.7a.7.7 0 0 0-.7-.7h-2.6z">

            </div>
            <div id="searchBarRow">

            </div>
            <div id="submissionRow">
                <div id="skipDiv" class="row">
                    <button id="skipButton">
                        SKIP (+2s)
                    </button>
                </div>
                <div class="row"></div>
                <div id="submitButtonDiv" class="row">
                    <button id="submitButton">
                        SUBMIT
                    </button>
                </div>
            </div>
        </div>
